# PMCI Fastify API — public HTTP.
# 1. Pick a globally unique app name (replace `pmci-api` below and in `fly apps create`).
# 2. From repo root: fly apps create pmci-api && fly deploy --config deploy/fly.api.toml
#
# Docs: docs/deployment-fly.md

app = "pmci-api"
primary_region = "iad"

# Paths are relative to this file's directory; root Dockerfile lives one level up.
[build]
  dockerfile = "../Dockerfile"

[env]
  PMCI_FLY_ROLE = "api"
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"
    method = "get"
    path = "/v1/health/freshness"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
