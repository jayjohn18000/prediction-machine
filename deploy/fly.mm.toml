# MM orchestrator runtime — SINGLE instance only (Invariant R14). Two replicas double-quote.
# Deploy: fly deploy --remote-only --config deploy/fly.mm.toml
#
# After first deploy enforce one machine:
#   fly scale count 1 -a pmci-mm-runtime --region iad

app = "pmci-mm-runtime"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile.mm"

[deploy]
  strategy = "immediate"

[env]
  PMCI_FLY_ROLE = "mm-runtime"
  MM_RUNTIME_COMPONENT = "orchestrator"
  PORT = "8790"

[http_service]
  internal_port = 8790
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    # Returns 200 from /health/mm; body now includes `ready` + `severity` for ops (Fly checks path only).
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"
    method = "get"
    path = "/health/mm"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[restart]]
  policy = "on-failure"
  retries = 10
