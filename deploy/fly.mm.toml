# MM runtime — single-instance Fly app for the Market Making MVP (W1+).
#
# W1 occupant: depth ingestion only (lib/ingestion/depth.mjs via a small entrypoint).
# W2+:         kalshi-trader WRITE client joins.
# W3+:         fair-value engine, quoting engine, risk manager, toxicity tracker,
#              and orchestrator all land in the same app.
#
# Invariant (MM plan §"Invariants"): MM deployment must be a SINGLE Fly instance.
# Never scale count > 1 without implementing leader election. Two orchestrators
# double-quote. The stateful L2 books in memory and the quote/fill state tracked
# in mm_orders/mm_fills/mm_positions require exactly one writer.
#
# Deploying (when ready — W1 verification can run locally first):
#   fly apps create pmci-mm-runtime
#   fly deploy --remote-only --config deploy/fly.mm.toml
#
# Secrets to set BEFORE first deploy (via `fly secrets set -a pmci-mm-runtime ...`):
#   KALSHI_DEMO_API_KEY_ID
#   KALSHI_DEMO_PRIVATE_KEY         (inline PEM; escape newlines as \n)
#   KALSHI_DEMO_WS_URL              (or rely on default in code)
#   KALSHI_DEMO_UNIVERSE_TICKERS    (comma-separated ticker list)
#   SUPABASE_URL, SUPABASE_ANON_KEY
#
# Docs: docs/plans/phase-mm-mvp-plan.md §"Deployment", docs/deployment-fly.md

app = "pmci-mm-runtime"
primary_region = "iad"

# Paths are relative to this file's directory; root Dockerfile lives one level up.
# W1 uses the shared root Dockerfile; W2/W3 may introduce a dedicated Dockerfile.mm
# if the MM runtime grows deps the observer doesn't need (unlikely for the core
# Node modules).
[build]
  dockerfile = "../Dockerfile"

[env]
  PMCI_FLY_ROLE = "mm-runtime"
  MM_RUNTIME_COMPONENT = "depth"   # W1 flag — switches to "full" when the orchestrator lands (W3)

# Single-instance guarantee: Fly will not launch a second machine under this config.
# If you ever scale this, implement leader election first.
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[restart]]
  policy = "on-failure"
  retries = 10

# No public HTTP services in W1 — the MM runtime does not accept inbound traffic.
# Admin HTTP with /health/mm lands in W3 per MM plan §"Deployment". When it does,
# add a [[services]] block similar to deploy/fly.api.toml.
