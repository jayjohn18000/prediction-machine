# MM orchestrator runtime — SINGLE instance only (Invariant R14). Two replicas double-quote.
# Deploy: fly deploy --remote-only --config deploy/fly.mm.toml
#
# After first deploy enforce one machine:
#   fly scale count 1 -a pmci-mm-runtime --region iad

app = "pmci-mm-runtime"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile.mm"

[deploy]
  strategy = "immediate"

[env]
  PMCI_FLY_ROLE = "mm-runtime"
  MM_RUNTIME_COMPONENT = "orchestrator"
  PORT = "8790"

[http_service]
  internal_port = 8790
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    # /health/mm returns 503 when severity=crit (set 2026-05-02 patch sweep,
    # ADR-011). Fly will flip the machine after sustained failure. The grace
    # period covers warm-up where loopTick=0 / depth 0/8 is expected. Combined
    # with [[restart]] on-failure below, this becomes the runtime watchdog
    # that ADR-011 requires before live cutover.
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "get"
    path = "/health/mm"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[restart]]
  policy = "on-failure"
  retries = 10
